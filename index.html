<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ITO｜伊東市事業者ポータル</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:sans-serif;
background:#f7f3ea;
color:#333;
}

.container{

max-width:1200px;

margin:auto;

padding:30px 24px;
}

.header{

text-align:center;
}

.chamber{

display:inline-flex;

align-items:center;

justify-content:center;

gap:8px;

padding:12px 18px;

background:#fff;

border-radius:999px;

text-decoration:none;

color:#333;

font-weight:bold;

box-shadow:0 3px 10px rgba(0,0,0,.08);

margin-bottom:24px;
}

h1{

font-size:32px;

margin:0 0 24px;
}

.hito{

display:inline-flex;

align-items:center;

justify-content:center;

gap:8px;

padding:12px 22px;

background:#fff;

border-radius:999px;

text-decoration:none;

color:#333;

font-weight:bold;

box-shadow:0 3px 10px rgba(0,0,0,.08);

margin-bottom:36px;
}

.grid{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:20px;

margin-bottom:20px;
}

.section{

background:#fff;

border-radius:20px;

padding:16px;

box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.section h2{

font-size:18px;

margin:0 0 14px;

text-align:center;
}

.image-frame{

height:160px;

display:flex;

align-items:center;

justify-content:center;

background:#f4f4f4;

border-radius:14px;

overflow:hidden;

margin-bottom:14px;
}

.section-image{

max-width:100%;

max-height:100%;

width:auto;

height:auto;
}

.button-row{

display:flex;

justify-content:center;

gap:10px;

flex-wrap:wrap;
}

.mini-link{

display:flex;

align-items:center;

gap:5px;

padding:9px 12px;

background:#f7f3ea;

border-radius:999px;

text-decoration:none;

color:#333;

font-size:13px;

font-weight:bold;
}

.furusato{

background:#fff;

border-radius:20px;

padding:18px;

box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.furusato-inner{

display:grid;

grid-template-columns:320px 1fr;

gap:24px;

align-items:center;
}

.furusato-image{

height:220px;

display:flex;

align-items:center;

justify-content:center;

background:#f4f4f4;

border-radius:14px;

overflow:hidden;
}

.furusato-content{

display:flex;

flex-direction:column;

justify-content:center;
}

.furusato-content p{

font-size:15px;

line-height:1.8;
}

.furusato-buttons{

display:flex;

gap:10px;

margin-top:16px;
}

.home{color:#0077cc;}

.hitoicon{color:#555;}

.map{color:#2f7d32;}

.insta{color:#d6249f;}

.tax{color:#d68b00;}

.footer{

text-align:center;

font-size:12px;

color:#777;

margin-top:28px;
}

@media(max-width:900px){

.grid{

grid-template-columns:1fr;
}

.furusato-inner{

grid-template-columns:1fr;
}

.furusato-buttons{

justify-content:center;
}

}

</style>

</head>
